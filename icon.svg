<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533"/>
      <stop offset="100%" style="stop-color:#0d0020"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c026d3"/>
      <stop offset="100%" style="stop-color:#ff3d8f"/>
    </linearGradient>
    <linearGradient id="fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3d8f;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#ff3d8f;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="round"><rect width="512" height="512" rx="110"/></clipPath>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- 그리드 라인 -->
  <g opacity="0.08" stroke="#ff3d8f" stroke-width="1">
    <line x1="0" y1="170" x2="512" y2="170"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="342" x2="512" y2="342"/>
    <line x1="170" y1="0" x2="170" y2="512"/>
    <line x1="342" y1="0" x2="342" y2="512"/>
  </g>

  <!-- 차트 면적 -->
  <path d="M 64 370 L 120 320 L 180 345 L 240 270 L 300 255 L 360 185 L 420 155 L 448 140 L 448 420 L 64 420 Z"
        fill="url(#fill)" clip-path="url(#round)"/>

  <!-- 차트 라인 -->
  <path d="M 64 370 L 120 320 L 180 345 L 240 270 L 300 255 L 360 185 L 420 155 L 448 140"
        fill="none" stroke="url(#line)" stroke-width="10"
        stroke-linecap="round" stroke-linejoin="round"
        filter="url(#glow)"/>

  <!-- 끝점 강조 원 -->
  <circle cx="448" cy="140" r="10" fill="#ff3d8f" filter="url(#glow)"/>
  <circle cx="448" cy="140" r="18" fill="none" stroke="#ff3d8f" stroke-width="3" opacity="0.5"/>

  <!-- SHE 텍스트 -->
  <text x="256" y="490" 
        font-family="Arial, sans-serif" font-weight="900" font-size="72"
        fill="url(#line)" text-anchor="middle" letter-spacing="12"
        filter="url(#glow)">SHE</text>
</svg>
