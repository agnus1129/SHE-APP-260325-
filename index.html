<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SHE">
<link rel="apple-touch-icon" href="/icon.svg">
<meta name="theme-color" content="#ff3d8f">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SHE 투자정보</title>
<style>
:root {
  --bg:#06060d; --surface:#0e0e1a; --card:#141422; --border:#2a1f3d;
  --accent:#ff3d8f; --accent2:#ff85b8; --green:#3fb950; --red:#f85149;
  --gold:#e3b341; --text:#f2ecf8; --muted:#9080a8; --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;min-height:100vh;max-width:480px;margin:0 auto;font-size:15px;line-height:1.75;}
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px;background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(255,61,143,0.13) 0%,transparent 70%),var(--bg);position:relative;overflow:hidden;}
#login-screen::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,61,143,0.07) 1px,transparent 1px),linear-gradient(90deg,rgba(255,61,143,0.07) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;}
.login-graphic{position:relative;width:200px;height:120px;margin-bottom:28px;flex-shrink:0;}
.login-title{font-size:32px;font-weight:900;letter-spacing:-0.5px;background:linear-gradient(135deg,#ff3d8f 0%,#ff9ec8 60%,#c084fc 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;text-align:center;}
.login-subtitle{font-size:15px;font-weight:600;color:var(--muted);margin-bottom:4px;text-align:center;letter-spacing:2px;}
.login-holder{font-size:18px;font-weight:800;color:var(--accent2);margin-bottom:4px;text-align:center;}
.login-sub{color:var(--muted);font-size:12px;margin-bottom:36px;text-align:center;opacity:0.6;}
.login-card{width:100%;background:rgba(14,14,26,0.9);border:1px solid rgba(255,61,143,0.25);border-radius:var(--radius);padding:24px;backdrop-filter:blur(12px);}
.login-card label{display:block;font-size:11px;color:var(--accent2);margin-bottom:6px;letter-spacing:1.5px;text-transform:uppercase;}
.login-card input{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,61,143,0.2);border-radius:8px;color:var(--text);font-size:16px;padding:13px 16px;margin-bottom:16px;outline:none;transition:border-color 0.2s;}
.login-card input:focus{border-color:var(--accent);}
.btn-primary{width:100%;padding:15px;background:linear-gradient(135deg,#ff3d8f,#c026d3);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:800;cursor:pointer;box-shadow:0 4px 20px rgba(255,61,143,0.35);}
.login-err{color:var(--red);font-size:13px;text-align:center;margin-top:12px;display:none;}
#app{display:none;flex-direction:column;min-height:100vh;}
.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.app-header-title{font-size:18px;font-weight:800;background:linear-gradient(135deg,#ff3d8f,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.app-header-user{font-size:13px;color:var(--muted);}
.btn-logout{background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;}
.tab-bar{background:var(--surface);border-bottom:1px solid var(--border);display:flex;}
.tab-btn{flex:1;padding:12px 4px;background:none;border:none;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-content{display:none;padding:16px;flex:1;}
.tab-content.active{display:block;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;}
.lookup-form{display:flex;gap:8px;margin-bottom:16px;}
.lookup-form input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:15px;padding:11px 13px;outline:none;}
.lookup-form input:focus{border-color:var(--accent);}
.btn-search{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:0 18px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.summary-cell{background:var(--card);border-radius:10px;padding:12px;text-align:center;}
.summary-cell .s-label{font-size:11px;color:var(--muted);margin-bottom:4px;}
.summary-cell .s-val{font-size:16px;font-weight:800;}
.holding-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color 0.2s;}
.holding-item:hover{border-color:var(--accent);}
.holding-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.holding-name{font-size:17px;font-weight:800;}
.holding-code{font-size:11px;color:var(--muted);margin-top:2px;}
.holding-pct{font-size:21px;font-weight:900;}
.holding-details{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.hd-label{font-size:10px;color:var(--muted);}
.hd-val{font-size:15px;font-weight:700;}
.signal-date{font-size:12px;color:var(--muted);margin-bottom:12px;}
.signal-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color 0.2s;}
.signal-item:hover{border-color:var(--gold);}
.signal-top{display:flex;justify-content:space-between;margin-bottom:8px;}
.signal-name{font-size:17px;font-weight:800;}
.signal-grade{font-size:12px;font-weight:800;padding:2px 8px;border-radius:20px;border:1px solid;}
.grade-A{color:var(--gold);border-color:var(--gold);background:rgba(227,179,65,0.1);}
.grade-B{color:var(--accent);border-color:var(--accent);background:rgba(255,61,143,0.1);}
.grade-C{color:var(--muted);border-color:var(--border);}
.signal-type{font-size:12px;color:var(--accent);background:rgba(255,61,143,0.1);padding:3px 8px;border-radius:4px;display:inline-block;}
.analysis-row{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border);}
.analysis-row:last-child{border-bottom:none;}
.analysis-label{color:var(--muted);font-size:14px;}
.analysis-val{font-weight:700;font-size:15px;}
.ind-row{display:flex;align-items:center;gap:8px;padding:10px 0;font-size:15px;border-bottom:1px solid var(--border);line-height:1.7;}
.ind-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot-green{background:var(--green);} .dot-red{background:var(--red);}
.ind-name{flex:1;color:var(--muted);}
.ind-val{font-weight:600;font-size:12px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-sheet{background:var(--surface);border-radius:16px 16px 0 0;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;padding:20px;animation:slideUp 0.25s ease;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal-handle{width:40px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 16px;}
.modal-close{float:right;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;}
.refresh-btn{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;margin-bottom:14px;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg);}}
.pending-msg,.empty-msg{text-align:center;color:var(--muted);padding:40px 16px;font-size:14px;}
.pos-text{color:var(--red);} .neg-text{color:var(--accent);} .neu-text{color:var(--muted);}
.btn-analyze{width:100%;padding:14px;margin-top:20px;background:linear-gradient(135deg,#ff3d8f,#c026d3);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 4px 16px rgba(255,61,143,0.35);}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-graphic">
    <svg width="200" height="120" viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="lg1" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#ff3d8f;stop-opacity:0.5"/><stop offset="100%" style="stop-color:#ff3d8f;stop-opacity:0"/></linearGradient>
        <linearGradient id="lg2" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#c026d3;stop-opacity:0.8"/><stop offset="100%" style="stop-color:#ff3d8f;stop-opacity:1"/></linearGradient>
        <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <line x1="0" y1="30" x2="200" y2="30" stroke="rgba(255,61,143,0.1)" stroke-width="1"/>
      <line x1="0" y1="60" x2="200" y2="60" stroke="rgba(255,61,143,0.1)" stroke-width="1"/>
      <line x1="0" y1="90" x2="200" y2="90" stroke="rgba(255,61,143,0.1)" stroke-width="1"/>
      <path d="M10,95 L30,80 L55,88 L75,65 L95,70 L115,45 L135,50 L155,28 L175,22 L190,12 L190,110 L10,110 Z" fill="url(#lg1)" opacity="0.6"/>
      <path d="M10,95 L30,80 L55,88 L75,65 L95,70 L115,45 L135,50 L155,28 L175,22 L190,12" stroke="url(#lg2)" stroke-width="2.5" fill="none" filter="url(#glow)" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="190" cy="12" r="4" fill="#ff3d8f" filter="url(#glow)"/>
      <rect x="155" y="4" width="38" height="14" rx="4" fill="rgba(255,61,143,0.2)" stroke="rgba(255,61,143,0.4)" stroke-width="1"/>
      <text x="174" y="14" fill="#ff85b8" font-size="8" font-weight="700" text-anchor="middle">+12.4%</text>
    </svg>
  </div>
  <div class="login-title">SHE 투자정보</div>
  <div class="login-subtitle">주식투자 정보서비스</div>
  <div id="login-holder" class="login-holder" style="display:none;"></div>
  <div class="login-sub">보유자 전용 · 실시간 투자정보</div>
  <div class="login-card">
    <label>전화번호</label>
    <input type="tel" id="input-phone" placeholder="등록된 전화번호를 입력하세요" maxlength="11">
    <button class="btn-primary" onclick="doLogin()">입장하기</button>
    <div class="login-err" id="login-err">전화번호를 확인해 주세요.</div>
  </div>
</div>

<div id="app">
  <div class="app-header">
    <div class="app-header-title">SHE 투자정보</div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="app-header-user" id="header-user"></div>
      <button class="btn-logout" onclick="doLogout()">로그아웃</button>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('lookup')">🔍 조회종목</button>
    <button class="tab-btn" onclick="switchTab('holdings')">💼 보유종목</button>
    <button class="tab-btn" onclick="switchTab('signals')">⚡ 추천종목</button>
  </div>
  <div id="tab-lookup" class="tab-content active">
    <div class="lookup-form">
      <input type="text" id="lookup-code" placeholder="종목코드 (예: 005930)" maxlength="6">
      <input type="text" id="lookup-name" placeholder="종목명" style="max-width:110px;">
      <button class="btn-search" onclick="requestLookup()">분석</button>
    </div>
    <div id="lookup-result-area"><div class="empty-msg">종목코드를 입력하고 분석 버튼을 누르세요.</div></div>
  </div>
  <div id="tab-holdings" class="tab-content">
    <button class="refresh-btn" onclick="loadHoldings()"><span id="holdings-spin"></span>🔄 새로고침</button>
    <div id="holdings-area"><div class="empty-msg">불러오는 중...</div></div>
  </div>
  <div id="tab-signals" class="tab-content">
    <button class="refresh-btn" onclick="loadSignals()"><span id="signals-spin"></span>🔄 새로고침</button>
    <div id="signals-area"><div class="empty-msg">불러오는 중...</div></div>
  </div>
</div>

<div class="modal-overlay" id="modal" onclick="closeModalOuter(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<script>
var BASE = "";
var AUTH = {token:"",phone:"",holder:""};
var urlToken = new URLSearchParams(location.search).get("token") || "";
var lookupTimer = null;
var holdingData = {};
var signalData = {};

// 보유자명 미리 로드
if (urlToken) {
  fetch(BASE+"/api/auth/holder?token="+encodeURIComponent(urlToken))
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.holder){
        var el=document.getElementById("login-holder");
        el.textContent=d.holder+" 님, 안녕하세요 👋";
        el.style.display="block";
      }
    }).catch(function(){});
}

// 로그인
function doLogin(){
  var phone=document.getElementById("input-phone").value.replace(/-/g,"").trim();
  if(!phone||phone.length<10){showLoginErr("전화번호를 올바르게 입력해 주세요.");return;}
  if(!urlToken){showLoginErr("올바른 링크로 접속해 주세요.");return;}
  document.querySelector(".btn-primary").textContent="확인 중...";
  fetch(BASE+"/api/auth/verify",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({token:urlToken,phone:phone})
  }).then(function(res){
    document.querySelector(".btn-primary").textContent="입장하기";
    if(!res.ok){showLoginErr("전화번호가 일치하지 않습니다.");return;}
    return res.json().then(function(d){
      AUTH={token:urlToken,phone:phone,holder:d.holder};
      document.getElementById("header-user").textContent=d.holder+" 님";
      document.getElementById("login-screen").style.display="none";
      document.getElementById("app").style.display="flex";
      loadHoldings();loadSignals();
    });
  }).catch(function(){
    document.querySelector(".btn-primary").textContent="입장하기";
    showLoginErr("서버 연결에 실패했습니다.");
  });
}

function doLogout(){
  AUTH={token:"",phone:"",holder:""};
  document.getElementById("login-screen").style.display="flex";
  document.getElementById("app").style.display="none";
  document.getElementById("input-phone").value="";
}

function showLoginErr(msg){
  var el=document.getElementById("login-err");
  el.textContent=msg;el.style.display="block";
  setTimeout(function(){el.style.display="none";},3000);
}

document.addEventListener("keydown",function(e){
  if(e.key==="Enter"&&document.getElementById("login-screen").style.display!=="none")doLogin();
});

// 탭
function switchTab(name){
  var tabs=["lookup","holdings","signals"];
  document.querySelectorAll(".tab-btn").forEach(function(b,i){b.classList.toggle("active",tabs[i]===name);});
  document.querySelectorAll(".tab-content").forEach(function(c){c.classList.remove("active");});
  document.getElementById("tab-"+name).classList.add("active");
}

// 조회종목
function requestLookup(){
  var code=document.getElementById("lookup-code").value.trim();
  while(code.length<6)code="0"+code;
  var name=document.getElementById("lookup-name").value.trim()||code;
  if(!code||code==="000000"){alert("종목코드를 입력하세요.");return;}
  var area=document.getElementById("lookup-result-area");
  area.innerHTML='<div class="pending-msg"><span class="spinner"></span>'+name+' 분석 요청 중...</div>';
  fetch(BASE+"/api/lookup/request",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({token:AUTH.token,phone:AUTH.phone,code:code,name:name})
  }).then(function(){
    if(lookupTimer)clearInterval(lookupTimer);
    lookupTimer=setInterval(function(){pollLookup(code,name);},3000);
  }).catch(function(){
    area.innerHTML='<div class="empty-msg">요청 실패. 다시 시도해 주세요.</div>';
  });
}

function pollLookup(code,name){
  fetch(BASE+"/api/lookup/result?token="+encodeURIComponent(AUTH.token)+"&phone="+encodeURIComponent(AUTH.phone)+"&code="+code)
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.status==="ready"){clearInterval(lookupTimer);renderLookup(code,name,d.result);}
    }).catch(function(){});
}

function renderLookup(code,name,r){
  if(!r)return;
  var area=document.getElementById("lookup-result-area");
  var cur=r.cur_price||0;
  var gap60=r.gap_60d||0;
  var total=r.total_score||0;
  var totalMax=r.total_max||15;
  var clr=function(v){return v>0?"pos-text":v<0?"neg-text":"neu-text";};
  var scClr=function(n,max){return n>=max*0.7?"pos-text":n>=max*0.4?"neu-text":"neg-text";};

  // ── 헤더: 종목명 + 현재가 + 60일종이격 ──
  var h='<div class="card">';
  h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;">';
  h+='<div><div style="font-size:20px;font-weight:800;">'+name+'</div>';
  h+='<div style="font-size:12px;color:var(--muted);">종목코드: '+code+'</div></div>';
  h+='<div style="text-align:right;">';
  h+='<div style="font-size:24px;font-weight:900;">'+cur.toLocaleString()+'원</div>';
  h+='<div class="'+clr(gap60)+'" style="font-size:14px;font-weight:700;">';
  h+='60일 이동평균 대비 '+(gap60>=0?"위":"아래")+' '+(Math.abs(gap60)).toFixed(2)+'%</div>';
  h+='</div></div>';
  h+='<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;justify-content:space-between;">';
  h+='<span style="font-size:13px;color:var(--muted);">전체 추세 종합점수</span>';
  h+='<span class="'+scClr(total,totalMax)+'" style="font-size:22px;font-weight:900;">'+total+' / '+totalMax+'점</span>';
  h+='</div></div>';

  // ── 봉별 추세 (월봉/주봉/일봉) ──
  var IND_NAMES={
    "이동평균 정배열": "📈 이동평균선 — 단기>중기>장기 (상승 배열)",
    "MACD 히스트":    "📊 MACD 히스토그램 — 매수 모멘텀 증가 여부",
    "RSI":            "⚡ RSI — 50 이상이면 매수세 우세",
    "ADX":            "💪 ADX — 25 이상이면 추세 강도 확인",
    "거래량 이평":    "📦 거래량 — 평균 대비 거래량 증가 여부"
  };
  var TF_LABELS=["📅 월봉 추세 (장기)","📆 주봉 추세 (중기)","📊 일봉 추세 (단기)"];
  var tfs=[r.trend_month,r.trend_week,r.trend_day];
  tfs.forEach(function(tf,i){
    if(!tf||!tf.indicators||!tf.indicators.length)return;
    var sc=tf.score_num||0;
    var scStr=tf.score||"0/5";
    h+='<div class="card">';
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">';
    h+='<div style="font-size:14px;font-weight:800;">'+TF_LABELS[i]+'</div>';
    h+='<div class="'+scClr(sc,5)+'" style="font-size:18px;font-weight:900;">'+scStr+'</div></div>';
    tf.indicators.forEach(function(ind){
      var desc=IND_NAMES[ind.name]||ind.name;
      var okStr=ind.ok?'<span class="pos-text">✅ 좋음</span>':'<span class="neg-text">❌ 미충족</span>';
      h+='<div style="padding:8px 0;border-bottom:1px solid var(--border);">';
      h+='<div style="display:flex;justify-content:space-between;align-items:center;">';
      h+='<div style="font-size:12px;color:var(--muted);flex:1;">'+desc+'</div>';
      h+='<div style="font-size:13px;font-weight:600;margin-left:8px;">'+okStr+'</div></div>';

// 보유종목
function loadHoldings(){
  var area=document.getElementById("holdings-area");
  var spin=document.getElementById("holdings-spin");
  spin.innerHTML='<span class="spinner"></span>';
  fetch(BASE+"/api/holdings?token="+encodeURIComponent(AUTH.token)+"&phone="+encodeURIComponent(AUTH.phone))
    .then(function(r){return r.json();})
    .then(function(d){spin.innerHTML="";renderHoldings(d);})
    .catch(function(){spin.innerHTML="";area.innerHTML='<div class="empty-msg">서버 연결 실패.</div>';});
}

function renderHoldings(data){
  var area=document.getElementById("holdings-area");
  var s=data.summary||{};
  var items=data.holdings||[];
  var p=function(n){return Number(n||0).toLocaleString();};
  var clr=function(v){return v>0?"pos-text":v<0?"neg-text":"neu-text";};
  if(!items.length){area.innerHTML='<div class="empty-msg">보유 종목이 없습니다.</div>';return;}
  var h='<div class="summary-grid">';
  h+='<div class="summary-cell"><div class="s-label">총 매입액</div><div class="s-val">'+p(s.total_entry)+'원</div></div>';
  h+='<div class="summary-cell"><div class="s-label">총 평가액</div><div class="s-val">'+p(s.total_eval)+'원</div></div>';
  h+='<div class="summary-cell"><div class="s-label">총 수익금</div><div class="s-val '+clr(s.total_profit)+'">'+(s.total_profit>=0?"+":"")+p(s.total_profit)+'원</div></div>';
  h+='<div class="summary-cell"><div class="s-label">총 수익률</div><div class="s-val '+clr(s.total_pct)+'">'+(s.total_pct>=0?"+":"")+(s.total_pct||0).toFixed(2)+'%</div></div>';
  h+='</div>';
  if(data.timestamp)h+='<div style="font-size:11px;color:var(--muted);margin-bottom:12px;">기준: '+data.timestamp.slice(0,16).replace("T"," ")+'</div>';
  h+='<div style="font-size:14px;font-weight:700;margin-bottom:12px;">보유 종목 ('+items.length+'종목)</div>';
  holdingData={};
  items.forEach(function(item,i){
    var key="hd"+i;
    holdingData[key]=item;
    var ep=item.entry_price||0;var cp=item.cur_price||0;var qty=item.qty||0;
    var pct=ep>0?((cp-ep)/ep*100):0;
    h+='<div class="holding-item" onclick="showHolding(\''+key+'\')">';
    h+='<div class="holding-top"><div>';
    h+='<div class="holding-name">'+item.name+'</div>';
    h+='<div class="holding-code">'+item.code+'</div></div>';
    h+='<div class="holding-pct '+clr(pct)+'">'+(pct>=0?"+":"")+pct.toFixed(2)+'%</div></div>';
    h+='<div class="holding-details">';
    h+='<div><div class="hd-label">매입가</div><div class="hd-val">'+p(ep)+'원</div></div>';
    h+='<div><div class="hd-label">현재가</div><div class="hd-val">'+p(cp)+'원</div></div>';
    h+='<div><div class="hd-label">수량</div><div class="hd-val">'+qty+'주</div></div>';
    h+='<div><div class="hd-label">평가액</div><div class="hd-val">'+p(cp*qty)+'원</div></div>';
    h+='</div></div>';
  });
  area.innerHTML=h;
}

function showHolding(key){
  var h=holdingData[key];if(!h)return;
  var p=function(n){return Number(n||0).toLocaleString();};
  var clr=function(v){return v>0?"pos-text":v<0?"neg-text":"neu-text";};
  var ep=h.entry_price||0;var cp=h.cur_price||0;var qty=h.qty||0;
  var pct=ep>0?((cp-ep)/ep*100):0;var prof=(cp-ep)*qty;
  var html='<div style="font-size:20px;font-weight:800;margin-bottom:4px;">'+h.name+'</div>';
  html+='<div style="font-size:12px;color:var(--muted);margin-bottom:20px;">'+h.code+'</div>';
  var rows=[
    ["매입가",p(ep)+"원"],["현재가",p(cp)+"원"],["수량",qty+"주"],
    ["매입금액",p(ep*qty)+"원"],["평가금액",p(cp*qty)+"원"],
    ["수익금액",'<span class="'+clr(prof)+'">'+(prof>=0?"+":"")+p(prof)+"원</span>"],
    ["수익률",'<span class="'+clr(pct)+'">'+(pct>=0?"+":"")+pct.toFixed(2)+"%</span>"],
    ["메모",h.memo||"-"]
  ];
  rows.forEach(function(r){
    html+='<div class="analysis-row"><span class="analysis-label">'+r[0]+'</span><span class="analysis-val">'+r[1]+'</span></div>';
  });
  html+='<button class="btn-analyze" onclick="lookupFromHolding(\''+h.code+'\',\''+h.name+'\')">📊 종목 분석 요청</button>';
  document.getElementById("modal-body").innerHTML=html;
  document.getElementById("modal").classList.add("open");
}

function lookupFromHolding(code,name){
  closeModal();
  switchTab("lookup");
  document.getElementById("lookup-code").value=code;
  document.getElementById("lookup-name").value=name;
  requestLookup();
}

  "기준선하락 BII상승": "기준선은 하락하지만 BII(매수강도)는 상승. 역발산 매수 신호.",
  "정배열 저가매수": "이동평균 정배열 상태에서 저점 매수 기회 발생.",
  "ADX ADX 55": "ADX 55 수준. 추세가 매우 강하게 진행 중. 추세 추종 유리.",
  "ADX ADX 58": "ADX 58 수준. 극강 추세 구간. 단, 과열에 의한 반전 주의.",
  "VO VO 62": "거래량 오실레이터 62. 단기 거래량이 중기 대비 크게 증가.",
  "Pivot Pivot 66": "피벗 포인트 66 수준. 핵심 저항/지지 구간 접근.",
  "이평산 배열 정배열 42": "이동평균선 정배열 지수 42. 상승 배열이 강하게 형성됨.",
  "이평산 배열 역배열 39": "이동평균선 역배열 지수 39. 하락 배열이 강하게 형성됨.",
};
var SIG_LABELS={
  "TRANS_UP_히스트":  "⚡ 횡보→상승 전환 + 매수세 증가",
  "TRANS_UP_단독":    "⚡ 횡보→상승 전환 (우량주)",
  "TRANS_UP_기관D20": "⚡ 횡보→상승 전환 + 기관 20일 매수중",
  "UP_히스트중기":    "📊 상승추세 + 매수세 재강화",
  "UP_히스트_S8강화": "📊 상승추세 + 바닥 매집 구간",
  "TRANS_UP_CCW_S2":  "⚡ 횡보→상승 전환 + 상승가속 진입",
  "UP_대차감소":      "📊 상승추세 + 공매도 감소",
  "UP_기관D20":       "📊 상승추세 + 기관 20일 매수중",
};

function renderSignals(data){
  var area=document.getElementById("signals-area");
  var sigs=data.signals||[];var date=data.date||"";
  if(!sigs.length){area.innerHTML='<div class="empty-msg">추천종목이 없습니다.<br>매일 오후 5시에 업데이트됩니다.</div>';return;}
  var h="";
  if(date.length===8)h+='<div class="signal-date">📅 '+date.slice(0,4)+'-'+date.slice(4,6)+'-'+date.slice(6,8)+' 기준</div>';
  signalData={};
  sigs.forEach(function(s,i){
    var key="sg"+i;signalData[key]=s;
    var grade=s.grade||"C";var label=SIG_LABELS[s.signal_type]||s.signal_type||"";
    h+='<div class="signal-item" onclick="showSignal(\''+key+'\')">';
    h+='<div class="signal-top"><div><div class="signal-name">'+(s.name||s.code)+'</div>';
    h+='<div style="font-size:11px;color:var(--muted);">'+s.code+'</div></div>';
    h+='<div class="signal-grade grade-'+grade+'">'+grade+'</div></div>';
    h+='<div class="signal-type">'+label+'</div></div>';
  });
  area.innerHTML=h;
}

function _trendKor(t){
  var m={"TRANS_UP":"상승 전환","UP":"상승중","SIDE":"횡보","DOWN":"하락","TRANS_DOWN":"하락 전환"};
  return m[t]||t||"-";
}
function showSignal(key){
  var s=signalData[key];if(!s)return;
  var grade=s.grade||"C";var label=SIG_LABELS[s.signal_type]||s.signal_type||"";

  var SIG_DESC={
    "TRANS_UP_히스트":  "오랫동안 옆으로 움직이던 주가가 위로 방향을 바꾸는 시점입니다. 동시에 매수세도 강해지고 있어 신뢰도가 높습니다.",
    "TRANS_UP_단독":    "재무가 우량한 종목이 횡보에서 상승으로 방향을 바꾸는 시점입니다. 단독으로도 믿을 수 있는 강한 신호입니다.",
    "TRANS_UP_기관D20": "상승 전환 시점에 기관투자자(펀드·보험·연기금 등)가 20일간 꾸준히 사들이고 있는 종목입니다.",
    "UP_히스트중기":    "이미 오르고 있는 종목에서 매수세가 다시 강해지는 시점입니다. 추세를 따라가는 중기 전략에 적합합니다.",
    "UP_히스트_S8강화": "상승추세이면서 저점에서 바닥을 다지는 매집 구간에 진입한 종목입니다. 조정 후 재상승 가능성이 높습니다.",
    "TRANS_UP_CCW_S2":  "상승 전환과 동시에 상승가속 구간에 진입한 종목입니다. 두 신호가 겹쳐 신뢰도가 높습니다.",
    "UP_대차감소":      "상승추세이면서 공매도(하락 베팅) 물량이 줄어드는 종목입니다. 하락 압력이 약해지는 긍정적 신호입니다.",
    "UP_기관D20":       "상승추세이면서 기관투자자가 20일간 꾸준히 매수 중인 종목입니다.",
  };
  var GRADE_DESC={
    "A":"A등급 — 최우선 진입 후보 (우량주, 조건 강함)",
    "B":"B등급 — 우선 진입 후보",
    "C":"C등급 — 일반 진입 후보",
  };
  var CCW_DESC={
    "S1":"S1 상승초입 — 하락 끝, 반등 시작",
    "S2":"S2 상승가속 — 본격 상승 구간",
    "S3":"S3 상승과열 — 고점 근처, 주의 필요",
    "S4":"S4 분산초입 — 상승 마무리",
    "S5":"S5 하락초입 — 하락 시작",
    "S6":"S6 하락가속 — 본격 하락",
    "S7":"S7 하락과매도 — 과매도, 반등 대기",
    "S8":"S8 매집초입 — 저점 매집 구간",
  };
  var TF_IND_NAME={
    "이동평균 정배열":"📈 이평 정배열",
    "MACD 0선 위치":"📊 MACD 0선",
    "ADX+DMI":"💪 ADX+DMI",
    "아룬 오실레이터":"🔄 아룬",
    "켈트너 채널":"📐 켈트너",
    "OBV":"📦 OBV",
    "MFI 자금흐름":"💰 MFI",
    "차이킨 오실레이터":"🏛 차이킨",
  };

  var html='';

  // ── 헤더 ──
  html+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;">';
  html+='<div><div style="font-size:20px;font-weight:800;">'+(s.name||s.code)+'</div>';
  html+='<div style="font-size:12px;color:var(--muted);">종목코드: '+s.code+'</div></div>';
  html+='<div class="signal-grade grade-'+grade+'">'+grade+'</div></div>';

  // ── 현재가 / 60일 종이격 ──
  if(s.cur_price&&s.cur_price>0){
    html+='<div style="display:flex;gap:12px;margin-bottom:12px;">';
    html+='<div style="flex:1;background:var(--card);border-radius:8px;padding:10px;text-align:center;">';
    html+='<div style="font-size:11px;color:var(--muted);">현재가</div>';
    html+='<div style="font-size:18px;font-weight:800;">'+s.cur_price.toLocaleString()+'원</div></div>';
    if(s.gap_60d!==undefined){
      var gClr=s.gap_60d>=0?"var(--green)":"var(--red)";
      html+='<div style="flex:1;background:var(--card);border-radius:8px;padding:10px;text-align:center;">';
      html+='<div style="font-size:11px;color:var(--muted);">60일 종이격</div>';
      html+='<div style="font-size:16px;font-weight:700;color:'+gClr+';">'+(s.gap_60d>=0?"+":"")+s.gap_60d.toLocaleString()+'원</div></div>';
    }
    html+='</div>';
  }

  // ── 신호 설명 ──
  html+='<div style="background:rgba(255,61,143,0.08);border:1px solid rgba(255,61,143,0.2);border-radius:8px;padding:12px;margin-bottom:12px;">';
  html+='<div style="font-size:15px;font-weight:800;color:var(--accent);">'+label+'</div>';
  html+='<div style="font-size:13px;color:var(--muted);margin-top:6px;">'+(GRADE_DESC[grade]||"")+'</div>';
  html+='</div>';

  // ── 진입 근거 ──
  html+='<div style="font-size:13px;color:var(--accent2);font-weight:700;margin-bottom:8px;">📋 진입 근거</div>';
  html+='<div style="background:var(--card);border-radius:8px;padding:12px;margin-bottom:14px;">';
  html+='<div style="font-size:14px;color:var(--text);line-height:1.8;">'+(SIG_DESC[s.signal_type]||s.signal_type||"-")+'</div>';
  html+='</div>';

  // ── 월봉/주봉/일봉 13점 추세 (압축 + 클릭 시 세부) ──
  var tfs=[
    {label:"📅 월봉",tf:s.trend_month},
    {label:"📆 주봉",tf:s.trend_week},
    {label:"📊 일봉",tf:s.trend_day},
  ];
  html+='<div style="font-size:13px;color:var(--accent2);font-weight:700;margin-bottom:8px;">📈 추세 분석 (13점 만점)</div>';
  html+='<div style="display:flex;gap:8px;margin-bottom:14px;" id="trend-bars">';
  tfs.forEach(function(t,i){
    var tf=t.tf; if(!tf) return;
    var sc=tf.score_num||0; var mx=tf.score_max||13;
    var pct=Math.round(sc/mx*100);
    var clr=pct>=70?"var(--green)":pct>=40?"var(--gold)":"var(--red)";
    html+='<div onclick="toggleTrendDetail('+i+')" style="flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;cursor:pointer;text-align:center;">';
    html+='<div style="font-size:12px;color:var(--muted);margin-bottom:4px;">'+t.label+'</div>';
    html+='<div style="font-size:20px;font-weight:900;color:'+clr+';">'+sc+'<span style="font-size:12px;color:var(--muted);">/'+mx+'</span></div>';
    // 점수 바
    html+='<div style="background:var(--border);border-radius:4px;height:4px;margin-top:6px;">';
    html+='<div style="background:'+clr+';width:'+pct+'%;height:4px;border-radius:4px;"></div></div>';
    html+='<div style="font-size:10px;color:var(--muted);margin-top:4px;">눌러서 상세보기</div>';
    html+='</div>';
  });
  html+='</div>';

  // 세부 추세 패널 (숨겨진 상태)
  tfs.forEach(function(t,i){
    var tf=t.tf; if(!tf||!tf.indicators||!tf.indicators.length) return;
    html+='<div id="trend-detail-'+i+'" style="display:none;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px;">';
    html+='<div style="font-size:13px;font-weight:800;margin-bottom:10px;">'+t.label+' 지표별 상세 ('+tf.score_num+'/'+tf.score_max+'점)</div>';
    tf.indicators.forEach(function(ind){
      var nm=TF_IND_NAME[ind.name]||ind.name;
      var sc=ind.score||0; var mx=ind.max||1;
      var clr=sc>0?"var(--green)":"var(--red)";
      var bar=""; for(var b=0;b<mx;b++){var bc=b<sc?"var(--green)":"var(--border)";bar+='<span style="color:'+bc+'">●</span>';}
      html+='<div style="padding:8px 0;border-bottom:1px solid var(--border);">';
      html+='<div style="display:flex;justify-content:space-between;align-items:center;">';
      html+='<div style="font-size:13px;font-weight:700;">'+nm+'</div>';
      html+='<div style="font-size:14px;font-weight:800;color:'+clr+';">'+sc+'/'+mx+'점 '+bar+'</div></div>';
      html+='<div style="font-size:12px;color:var(--muted);margin-top:3px;">'+ind.display+'</div>';
      html+='</div>';
    });
    html+='</div>';
  });

  // ── CCW + MACD + 기관 ──
  html+='<div style="font-size:13px;color:var(--accent2);font-weight:700;margin-bottom:8px;">📌 상세 지표</div>';
  var rows=[
    ["역시계곡선(CCW)", CCW_DESC[s.ccw]||s.ccw||"-", "주가-거래량 관계로 시장 국면 파악"],
    ["MACD 히스토그램", s.hist_up?"📈 증가 중 (매수 모멘텀 강화)":"📉 감소 중", "매수/매도 모멘텀 강도"],
    ["기관 순매수", s.inst_buy?"✅ 최근 매수 중":"❌ 매수 없음", "기관투자자 순매수 여부"],
  ];
  if(s.all_signals&&s.all_signals.length>1){
    rows.push(["복수 신호", s.all_signals.map(function(k){return SIG_LABELS[k]||k;}).join("<br>"), "여러 신호 동시 발생 — 신뢰도 높음"]);
  }
  rows.forEach(function(row){
    html+='<div style="padding:10px 0;border-bottom:1px solid var(--border);">';
    html+='<div style="display:flex;justify-content:space-between;align-items:flex-start;">';
    html+='<div style="font-size:13px;color:var(--muted);min-width:110px;">'+row[0]+'</div>';
    html+='<div style="font-size:14px;font-weight:700;text-align:right;flex:1;">'+row[1]+'</div></div>';
    html+='<div style="font-size:11px;color:var(--muted);margin-top:2px;">'+row[2]+'</div>';
    html+='</div>';
  });

  // 기관 안내
  if(!s.inst_buy){
    html+='<div style="background:rgba(248,81,73,0.06);border:1px solid rgba(248,81,73,0.2);border-radius:8px;padding:10px;margin-top:12px;">';
    html+='<div style="font-size:12px;color:var(--muted);">ℹ️ 기관순매수 데이터는 전일 기준으로 반영됩니다.</div>';
    html+='</div>';
  }

  document.getElementById("modal-body").innerHTML=html;
  document.getElementById("modal").classList.add("open");
}

function toggleTrendDetail(i){
  var el=document.getElementById("trend-detail-"+i);
  if(!el)return;
  el.style.display=el.style.display==="none"?"block":"none";
}

// 모달
function closeModal(){document.getElementById("modal").classList.remove("open");}
function closeModalOuter(e){if(e.target===document.getElementById("modal"))closeModal();}

// 자동 새로고침 3분
setInterval(function(){if(AUTH.token&&AUTH.phone){loadHoldings();loadSignals();}},180000);
</script>
</body>
</html>
